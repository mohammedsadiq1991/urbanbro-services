<!DOCTYPE html>
<html>
<head>
<title>UrbanBro Services</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #0b3c5d;
  color: white;
  text-align: center;
  padding: 20px;
}

header img {
  width: 90px;
  margin-bottom: 10px;
}

.tagline {
  color: #f9a826;
  font-weight: bold;
}

/* HERO */
.hero {
  text-align: center;
  padding: 30px;
}

.hero img {
  width: 100%;
  max-height: 250px;
  object-fit: cover;
  border-radius: 5px;
}

/* SERVICES GRID */
.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  padding: 20px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.box img {
  width: 40px;
  margin-bottom: 10px;
}

/* DROPDOWN */
.dropdown {
  text-align: center;
  padding: 20px;
}

select {
  padding: 12px;
  font-size: 16px;
  width: 250px;
}

/* BUTTON */
button {
  background: #f9a826;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 15px;
}

button:hover {
  background: #e08e00;
}

/* FOOTER */
footer {
  background: #0b3c5d;
  color: white;
  text-align: center;
  padding: 15px;
}
</style>
</head>

<body>

<header>
  <!-- ADD YOUR LOGO FILE HERE -->
  <img src="logo.png">
  <h1>UrbanBro Services</h1>
  <p class="tagline">Fast Fixes. Trusted Bros.</p>
</header>

<div class="hero">
  <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
  <h2>Reliable Home Services in Dubai</h2>
  <p>Fast, affordable & trusted service at your doorstep</p>
</div>

<div class="services">
  <div class="box">
    <img src="https://img.icons8.com/ios-filled/50/000000/plumbing.png">
    Plumbing
  </div>

  <div class="box">
    <img src="https://img.icons8.com/ios-filled/50/000000/electrical.png">
    Electrical
  </div>

  <div class="box">
    <img src="https://img.icons8.com/ios-filled/50/000000/air-conditioner.png">
    AC Repair
  </div>

  <div class="box">
    <img src="https://img.icons8.com/ios-filled/50/000000/hammer.png">
    Carpentry
  </div>

  <div class="box">
    <img src="https://img.icons8.com/ios-filled/50/000000/paint-roller.png">
    Painting
  </div>

  <div class="box">
    <img src="https://img.icons8.com/ios-filled/50/000000/toolbox.png">
    Handyman
  </div>

  <div class="box">
    <img src="https://img.icons8.com/ios-filled/50/000000/bug.png">
    Pest Control
  </div>
</div>

<div class="dropdown">
  <h3>Select Your Service</h3>
  <select>
    <option>Plumbing</option>
    <option>Electrical</option>
    <option>AC Repair</option>
    <option>Carpentry</option>
    <option>Painting</option>
    <option>Handyman</option>
    <option>Pest Control</option>
  </select>
  <br>
  <button onclick="contact()">Book on WhatsApp</button>
</div>

<footer>
  <p>📞 WhatsApp: +971 50 160 4258</p>
  <p>© 2026 UrbanBro Services Dubai</p>
</footer>

<script>
function contact() {
  window.location.href = "https://wa.me/971501604258";
}
</script>

</body>
</html>

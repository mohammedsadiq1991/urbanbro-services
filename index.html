<!DOCTYPE html>
<html>
<head>

}

h1 {
  margin: 0;

  border: none;
  padding: 15px 25px;
  font-size: 16px;

  cursor: pointer;
}

footer {
  background: #0b3c5d;
  color: white;
  padding: 10px;

</style>

</head>

<body>

<header>
  <h1>UrbanBro Services</h1>

  <div class="box">Electrical</div>
  <div class="box">AC Repair</div>
  <div class="box">Carpentry</div>
  <div class="box">Painting</div>

</div>

<br>

<button onclick="contact()">Book on WhatsApp</button>

<footer>
  <p>© 2026 UrbanBro Services Dubai</p>
</footer>

  window.location.href = "https://wa.me/971501604258";
}
</script>

</html>
